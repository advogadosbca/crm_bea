services:
  crm:
    build:
      context: .
      args:
        # públicas — embutidas no build
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    image: crm-bernardes:latest
    container_name: crm-bernardes
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      # SECRETA — só no servidor, nunca exposta ao navegador
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      # roteamento HTTPS
      - "traefik.http.routers.crm.rule=Host(`${CRM_DOMAIN}`)"
      - "traefik.http.routers.crm.entrypoints=websecure"
      - "traefik.http.routers.crm.tls=true"
      - "traefik.http.routers.crm.tls.certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.services.crm.loadbalancer.server.port=3000"
      # redireciona HTTP -> HTTPS
      - "traefik.http.routers.crm-http.rule=Host(`${CRM_DOMAIN}`)"
      - "traefik.http.routers.crm-http.entrypoints=web"
      - "traefik.http.routers.crm-http.middlewares=crm-redirect"
      - "traefik.http.middlewares.crm-redirect.redirectscheme.scheme=https"
      # informa ao Traefik em qual rede falar com este container
      - "traefik.docker.network=traefik"

# rede externa onde o Traefik já está rodando.
# Ajuste o nome se a sua rede do Traefik tiver outro nome (ex.: proxy, web).
networks:
  traefik:
    external: true
