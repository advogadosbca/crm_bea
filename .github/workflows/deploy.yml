name: Build & push imagem (GHCR)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/advogadosbca/crm_bea:latest
            ghcr.io/advogadosbca/crm_bea:${{ github.sha }}
          # NEXT_PUBLIC_* são públicas (vão para o navegador) — ok ficarem aqui.
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://muxsyyezvcvggyimgxsl.supabase.co
