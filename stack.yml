version: "3.7"

# Stack do CRM Bernardes & Azevedo — Docker Swarm + Traefik (Portainer)
#
# A imagem é publicada automaticamente no GHCR pelo GitHub Actions a cada push
# na branch main (.github/workflows/deploy.yml). Esta stack só PUXA a imagem.
#
# Pré-requisito no Portainer (uma vez): cadastrar o registry GHCR
#   Registries -> Add registry -> Custom:
#     URL: ghcr.io  |  Usuário: <seu_usuario_github>  |  Senha: <PAT com read:packages>
# (ou tornar o pacote ghcr.io/advogadosbca/crm_bea público).
#
# Em "Environment variables" da stack, defina apenas:
#   SUPABASE_SERVICE_ROLE_KEY=eyJ...service_role...   (SECRETA)

services:
  crm:
    image: ghcr.io/advogadosbca/crm_bea:latest
    networks:
      - network_swarm_public
    environment:
      # públicas (seguras)
      - NEXT_PUBLIC_SUPABASE_URL=https://muxsyyezvcvggyimgxsl.supabase.co
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11eHN5eWV6dmN2Z2d5aW1neHNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTcwMTQsImV4cCI6MjA5Nzk3MzAxNH0.Ay1S5WS4GZePRCZQiqYhoaWdf3d-uKhda3cmIsjvyaU
      # secreta — defina em Environment variables da stack
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NODE_ENV=production
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 1024M
      labels:
        - traefik.enable=true
        - traefik.http.routers.crm.rule=Host(`crm.bernardeseazevedo.com.br`)
        - traefik.http.routers.crm.entrypoints=websecure
        - traefik.http.routers.crm.tls.certresolver=letsencryptresolver
        - traefik.http.routers.crm.service=crm
        - traefik.http.services.crm.loadbalancer.server.port=3000
        - traefik.http.services.crm.loadbalancer.passHostHeader=true
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback

networks:
  network_swarm_public:
    name: network_swarm_public
    external: true
